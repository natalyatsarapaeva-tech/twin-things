<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Twin Things">
  <link rel="manifest" href="manifest.json">
  <title>Twin Things</title>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Загрузка -->
  <div id="loading">
    <div class="loading-icon">🏠</div>
    <div class="loading-text">Twin Things</div>
  </div>

  <!-- Экран входа -->
  <div id="auth" class="auth-wrap" style="display:none;">
    <div class="auth-title">Twin <em>Things</em></div>
    <div class="auth-sub">Совместный каталог домашних вещей. Войди, чтобы открыть свои каталоги.</div>
    <div class="auth-card">
      <button class="btn btn-google" id="btn-google">🔵 Войти через Google</button>
      <div class="divider">или по email</div>
      <input class="field-input" id="in-email" type="email" placeholder="Email" autocomplete="email">
      <input class="field-input" id="in-pass" type="password" placeholder="Пароль" autocomplete="current-password">
      <div class="auth-error" id="auth-error"></div>
      <button class="btn btn-primary" id="btn-email">Войти</button>
      <button class="auth-switch" id="btn-toggle-mode">Нет аккаунта? Зарегистрироваться</button>
    </div>
  </div>

  <!-- Приложение -->
  <div id="app" style="display:none;">
    <header class="app-header">
      <div class="header-top">
        <button class="catalog-switch" id="catalog-switch">
          <span class="cs-name" id="cs-name">Мой дом</span>
          <span class="cs-caret">▾</span>
        </button>
        <button class="header-avatar" id="avatar" title="Профиль / выход">?</button>
      </div>
      <div class="header-stats">
        <span class="stat-chip" id="stat-count">0 вещей</span>
        <span class="stat-chip" id="stat-value" style="display:none;"></span>
        <span class="stat-chip" id="stat-sale" style="display:none;"></span>
        <span class="stat-chip" id="stat-role">—</span>
      </div>
    </header>

    <div class="toolbar" id="toolbar" style="display:none;">
      <div class="search-row">
        <input class="search-input" id="search" placeholder="Поиск по названию, тегу, характеристике…" autocomplete="off">
      </div>
      <div class="group-row">
        <label class="group-label" for="group-by">Отображать по</label>
        <select class="select-input" id="group-by"></select>
      </div>
      <div class="filter-scroll" id="filters"></div>
      <div class="toolbar-foot">
        <button class="filter-clear" id="filter-clear" style="display:none;">Сбросить фильтры</button>
        <button class="select-toggle" id="select-toggle">☑︎ Выбрать</button>
      </div>
    </div>

    <main class="items-grid" id="items-grid">
      <!-- наполняется карточками -->
    </main>

    <div class="fab-group" id="fab-group">
      <a class="fab fab-set" href="settings.html" title="Настройки">⚙</a>
      <a class="fab fab-ai" href="add-item.html#ai" title="AI-добавление">✨</a>
      <a class="fab" href="add-item.html" title="Добавить вещь">＋</a>
    </div>

    <!-- Панель массовых действий -->
    <div class="bulk-bar" id="bulk-bar">
      <div class="bulk-top">
        <button id="bulk-cancel">Отмена</button>
        <span class="bulk-count" id="bulk-count">Выбрано: 0</span>
        <button id="bulk-all">Выбрать все</button>
      </div>
      <div class="hint">Присвоить статус выбранным:</div>
      <div class="chip-row" id="bulk-status"></div>
      <button class="btn btn-danger btn-block" id="bulk-delete" disabled>🗑 Удалить выбранное</button>
    </div>
  </div>

  <div class="saving-overlay" id="saving">
    <div class="saving-box"><span class="spinner"></span><span id="saving-text">Готово…</span></div>
  </div>

  <!-- Свитчер каталогов -->
  <div class="overlay" id="switch-overlay"></div>
  <div class="sheet" id="switch-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-body">
      <div class="sheet-title">Мои каталоги</div>
      <div id="catalog-list"></div>
      <div class="divider">создать или присоединиться</div>
      <input class="field-input" id="new-catalog-name" placeholder="Название нового каталога">
      <button class="btn btn-ghost" id="btn-create-catalog">＋ Создать каталог</button>
      <input class="field-input" id="join-code" placeholder="Код приглашения (напр. K7QMР2)">
      <button class="btn btn-ghost" id="btn-join">Присоединиться по коду</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import {
      initAuth, currentUid, currentUserName, currentUserEmail,
      signInGoogle, signInEmail, registerEmail, signOutUser,
      listMyCatalogs, ensureFirstCatalog, getActiveCatalogId, setActiveCatalogId,
      resolveActiveCatalog, createCatalog, joinCatalogByCode, listItems, loadTaxonomy,
      saveItem, deleteItem,
    } from './js/store.js';
    import {
      filterItems, sortItems, catalogStats, primaryPhoto, labelOf,
      ITEM_STATUSES, statusLabel, formatMoney,
      collectLocations, collectRooms, DISPLAY_DIMENSIONS,
    } from './js/catalog-core.js';

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    let mode = 'signin'; // signin | register

    // Состояние грида
    let allItems = [];
    let activeCid = null;
    let taxonomy = { categories: [], tags: [], templates: {} };
    let sortKey = localStorage.getItem('itemsSort') || 'newest';  // задаётся в настройках
    let groupBy = localStorage.getItem('groupBy') || 'category';  // «Отображать по»
    let facet = '';       // выбранное значение в текущем срезе
    let searchText = '';

    function toast(msg) {
      const t = $('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }
    function show(el) { el.style.display = el === $('app') ? 'block' : (el === $('auth') ? 'flex' : 'block'); }
    function hide(el) { el.style.display = 'none'; }

    // Понятный текст по коду ошибки Firebase (Auth + Firestore permission).
    function authError(e) {
      const code = e?.code || '';
      const map = {
        'auth/unauthorized-domain': 'Домен не разрешён: Firebase → Authentication → Settings → Authorized domains → добавь natalyatsarapaeva-tech.github.io.',
        'auth/operation-not-allowed': 'Провайдер входа не включён: Firebase → Authentication → Sign-in method (включи Google и Email/Password).',
        'auth/popup-blocked': 'Браузер заблокировал всплывающее окно. Разреши попапы и попробуй снова (или переключимся на redirect).',
        'auth/popup-closed-by-user': 'Окно входа закрыли до завершения — попробуй ещё раз.',
        'auth/invalid-api-key': 'Неверный apiKey в js/firebase.js.',
        'auth/invalid-credential': 'Неверный email или пароль.',
        'auth/wrong-password': 'Неверный пароль.',
        'auth/user-not-found': 'Пользователь не найден — зарегистрируйся.',
        'auth/email-already-in-use': 'Этот email уже зарегистрирован — войди.',
        'auth/weak-password': 'Пароль слишком короткий (минимум 6 символов).',
        'auth/network-request-failed': 'Сеть недоступна или запрос заблокирован.',
        'permission-denied': 'Вход прошёл, но нет доступа к базе — задеплой firestore.rules (и storage.rules).',
      };
      if (map[code]) return map[code];
      if (/permission/i.test(code) || /permission/i.test(e?.message || '')) return map['permission-denied'];
      return 'Ошибка входа: ' + (code || e?.message || 'неизвестно');
    }

    // ── Поток запуска ──
    (async function boot() {
      try {
        const user = await initAuth();
        hide($('loading'));
        if (!user) { show($('auth')); return; }
        // Авторизация уже есть — если дальше упадёт (правила и т.п.), покажем
        // причину на экране входа, а не молча вернём к логину.
        try { await enterApp(); }
        catch (e) { console.error(e); show($('auth')); $('auth-error').textContent = authError(e); }
      } catch (err) {
        console.error(err); hide($('loading')); show($('auth')); $('auth-error').textContent = authError(err);
      }
    })();

    // ── Вход ──
    $('btn-google').onclick = async () => {
      $('auth-error').textContent = '';
      $('btn-google').disabled = true;
      try {
        const cred = await signInGoogle();
        if (cred) await enterApp(); // null → пошёл redirect, страница уйдёт
      } catch (e) {
        console.error(e); $('auth-error').textContent = authError(e);
      } finally { $('btn-google').disabled = false; }
    };
    $('btn-toggle-mode').onclick = () => {
      mode = mode === 'signin' ? 'register' : 'signin';
      $('btn-email').textContent = mode === 'signin' ? 'Войти' : 'Зарегистрироваться';
      $('btn-toggle-mode').textContent = mode === 'signin'
        ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
      $('auth-error').textContent = '';
    };
    $('btn-email').onclick = async () => {
      const email = $('in-email').value.trim(), pass = $('in-pass').value;
      if (!email || !pass) { $('auth-error').textContent = 'Введи email и пароль.'; return; }
      $('auth-error').textContent = '';
      $('btn-email').disabled = true;
      try {
        if (mode === 'signin') await signInEmail(email, pass);
        else await registerEmail(email, pass);
        await enterApp();
      } catch (e) {
        console.error(e); $('auth-error').textContent = authError(e);
      } finally { $('btn-email').disabled = false; }
    };

    // ── Вход в приложение ──
    async function enterApp() {
      hide($('auth'));
      // При первом входе авто-создаётся личный каталог «Мой дом».
      await ensureFirstCatalog();
      const avatar = $('avatar');
      const name = currentUserName() || currentUserEmail() || '?';
      avatar.textContent = name.trim().charAt(0).toUpperCase() || '?';
      buildBulkStatus();
      show($('app'));
      await refresh();
    }

    async function refresh() {
      const cats = await listMyCatalogs();
      const activeId = resolveActiveCatalog(cats);
      activeCid = activeId;
      const active = cats.find(c => c.id === activeId);
      $('cs-name').textContent = active?.name || 'Каталог';
      $('stat-role').textContent = active?.role === 'owner' ? '👑 владелец' : '✎ редактор';
      renderCatalogList(cats, activeId);

      [taxonomy, allItems] = await Promise.all([
        activeId ? loadTaxonomy(activeId) : Promise.resolve({ categories: [], tags: [], templates: {} }),
        activeId ? listItems(activeId) : Promise.resolve([]),
      ]);

      // Статистика хедера по всему каталогу (не по фильтру).
      const stats = catalogStats(allItems);
      $('stat-count').textContent = `${stats.count} ${plural(stats.count)}`;
      setChip('stat-value', stats.totalValue > 0, `💰 ${formatMoney(stats.totalValue)}`);
      setChip('stat-sale', stats.forSale > 0, `🏷 ${stats.forSale} на продажу`);

      buildGroupBy();
      buildFilters();
      $('toolbar').style.display = allItems.length ? 'flex' : 'none';
      applyFilters();
    }

    function setChip(id, show, text) {
      const el = $(id);
      el.style.display = show ? '' : 'none';
      if (show) el.textContent = text;
    }

    function plural(n) {
      const a = Math.abs(n) % 100, b = a % 10;
      if (a > 10 && a < 20) return 'вещей';
      if (b > 1 && b < 5) return 'вещи';
      if (b === 1) return 'вещь';
      return 'вещей';
    }

    // ── Тулбар: «Отображать по» (срез) + фильтры-чипы ──
    function buildGroupBy() {
      const sel = $('group-by');
      if (!sel.dataset.built) {
        sel.innerHTML = DISPLAY_DIMENSIONS.map(d => `<option value="${d.id}">${esc(d.label)}</option>`).join('');
        sel.onchange = () => {
          groupBy = sel.value; localStorage.setItem('groupBy', groupBy);
          facet = '';           // при смене среза сбрасываем выбранный фильтр
          buildFilters(); applyFilters();
        };
        sel.dataset.built = '1';
      }
      sel.value = groupBy;
    }

    // Значения текущего среза → [значение, подпись].
    function facetOptions() {
      switch (groupBy) {
        case 'tag':      return taxonomy.tags.map(t => [t.id, t.label]);
        case 'status':   return ITEM_STATUSES.map(s => [s, statusLabel(s)]);
        case 'location': return collectLocations(allItems).map(l => [l, l]);
        case 'room':     return collectRooms(allItems).map(r => [r, r]);
        case 'category':
        default:         return taxonomy.categories.map(c => [c.id, c.label]);
      }
    }
    function buildFilters() {
      const opts = facetOptions();
      $('filters').innerHTML = opts.length
        ? opts.map(([val, label]) => `<button type="button" class="chip" data-val="${esc(val)}">${esc(label)}</button>`).join('')
        : '<span class="hint">Нет значений для этого среза.</span>';
      $('filters').querySelectorAll('.chip').forEach(ch => ch.onclick = () => {
        facet = facet === ch.dataset.val ? '' : ch.dataset.val;  // toggle
        syncChipState(); applyFilters();
      });
      syncChipState();
    }
    function syncChipState() {
      $('filters').querySelectorAll('.chip').forEach(ch => ch.classList.toggle('on', facet === ch.dataset.val));
      $('filter-clear').style.display = (searchText || facet) ? '' : 'none';
    }

    $('search').oninput = (e) => { searchText = e.target.value; syncChipState(); applyFilters(); };
    $('filter-clear').onclick = () => {
      searchText = ''; facet = '';
      $('search').value = '';
      syncChipState(); applyFilters();
    };

    let visibleItems = [];   // текущий отфильтрованный/отсортированный список
    function applyFilters() {
      const f = { text: searchText };
      if (facet) f[groupBy] = facet;   // groupBy ∈ category|tag|status|location|room
      visibleItems = sortItems(filterItems(allItems, f), sortKey);
      renderItems(visibleItems);
    }

    function renderItems(items) {
      const grid = $('items-grid');
      if (!allItems.length) {
        grid.innerHTML = `<div class="empty-state fade-in">
          <div class="es-icon">📦</div>
          <div>Пока пусто. Добавь первую вещь — вручную или по фото через ✨ AI.</div>
        </div>`;
        return;
      }
      if (!items.length) {
        grid.innerHTML = `<div class="empty-state fade-in">
          <div class="es-icon">🔍</div>
          <div>Ничего не найдено. Измени запрос или сбрось фильтры.</div>
        </div>`;
        return;
      }
      grid.innerHTML = items.map(it => {
        const cover = primaryPhoto(it);
        const thumb = cover
          ? `<img class="item-thumb" src="${esc(cover.thumbUrl || cover.url)}" alt="" loading="lazy">`
          : `<div class="item-thumb placeholder">📦</div>`;
        const tags = (it.tags || []).slice(0, 3)
          .map(t => `<span class="item-tag">${esc(labelOf(taxonomy.tags, t))}</span>`).join('');
        const isPicked = picked.has(it.id);
        return `<button class="item-card fade-in${isPicked ? ' picked' : ''}" data-id="${esc(it.id)}">
          ${selectMode ? '<span class="sel-check">✓</span>' : ''}
          ${thumb}
          <div class="item-body">
            <div class="item-name">${esc(it.name || 'Без названия')}</div>
            ${it.category ? `<span class="item-cat">${esc(labelOf(taxonomy.categories, it.category))}</span>` : ''}
            <div class="item-tags">${tags}</div>
          </div>
        </button>`;
      }).join('');
      grid.querySelectorAll('.item-card').forEach(card => {
        card.onclick = () => {
          const id = card.dataset.id;
          if (selectMode) togglePick(id, card);
          else location.href = `item.html?id=${encodeURIComponent(id)}`;
        };
      });
    }

    // ── Массовый выбор ──────────────────────────────────────────────────────
    let selectMode = false;
    const picked = new Set();

    function buildBulkStatus() {
      $('bulk-status').innerHTML = ITEM_STATUSES
        .map(s => `<button type="button" class="chip" data-status="${s}">${esc(statusLabel(s))}</button>`).join('');
      $('bulk-status').querySelectorAll('.chip').forEach(ch => ch.onclick = () => applyBulkStatus(ch.dataset.status));
    }

    function setSelectMode(on) {
      selectMode = on;
      if (!on) picked.clear();
      $('bulk-bar').classList.toggle('on', on);
      $('fab-group').style.display = on ? 'none' : '';
      $('select-toggle').classList.toggle('on', on);
      $('select-toggle').textContent = on ? '✕ Готово' : '☑︎ Выбрать';
      updateBulkBar();
      renderItems(visibleItems);
    }
    $('select-toggle').onclick = () => setSelectMode(!selectMode);
    $('bulk-cancel').onclick = () => setSelectMode(false);

    function togglePick(id, card) {
      if (picked.has(id)) { picked.delete(id); card.classList.remove('picked'); }
      else { picked.add(id); card.classList.add('picked'); }
      updateBulkBar();
    }
    function updateBulkBar() {
      $('bulk-count').textContent = `Выбрано: ${picked.size}`;
      $('bulk-delete').disabled = !picked.size;
      const allVisiblePicked = visibleItems.length && visibleItems.every(it => picked.has(it.id));
      $('bulk-all').textContent = allVisiblePicked ? 'Снять все' : 'Выбрать все';
    }
    $('bulk-all').onclick = () => {
      const allVisiblePicked = visibleItems.length && visibleItems.every(it => picked.has(it.id));
      if (allVisiblePicked) picked.clear();
      else visibleItems.forEach(it => picked.add(it.id));
      updateBulkBar();
      renderItems(visibleItems);
    };

    async function applyBulkStatus(status) {
      const ids = [...picked];
      if (!ids.length) { toast('Ничего не выбрано'); return; }
      $('saving').classList.add('on');
      try {
        let n = 0;
        for (const id of ids) {
          const it = allItems.find(x => x.id === id);
          if (!it) continue;
          n++; $('saving-text').textContent = `Меняю статус ${n}/${ids.length}…`;
          it.status = status;
          await saveItem(activeCid, it);
        }
        $('saving').classList.remove('on');
        setSelectMode(false);
        toast(`Статус «${statusLabel(status)}» — ${n} шт.`);
        await refresh();
      } catch (err) {
        console.error(err); $('saving').classList.remove('on');
        toast('Не удалось изменить статус');
      }
    }
    $('bulk-delete').onclick = async () => {
      const ids = [...picked];
      if (!ids.length) return;
      if (!confirm(`Удалить выбранное (${ids.length})? Действие нельзя отменить.`)) return;
      $('saving').classList.add('on');
      try {
        let n = 0;
        for (const id of ids) {
          const it = allItems.find(x => x.id === id);
          if (!it) continue;
          n++; $('saving-text').textContent = `Удаляю ${n}/${ids.length}…`;
          await deleteItem(activeCid, it);
        }
        $('saving').classList.remove('on');
        setSelectMode(false);
        toast(`Удалено: ${n}`);
        await refresh();
      } catch (err) {
        console.error(err); $('saving').classList.remove('on');
        toast('Не удалось удалить');
      }
    };

    function renderCatalogList(cats, activeId) {
      $('catalog-list').innerHTML = cats.map(c => `
        <div class="catalog-row ${c.id === activeId ? 'active' : ''}" data-cid="${esc(c.id)}">
          <span>${esc(c.name || 'Каталог')}</span>
          <span class="role-badge">${c.role === 'owner' ? 'владелец' : 'редактор'}</span>
        </div>`).join('');
      $('catalog-list').querySelectorAll('.catalog-row').forEach(row => {
        row.onclick = async () => {
          setActiveCatalogId(row.dataset.cid);
          if (selectMode) setSelectMode(false);
          closeSwitch(); await refresh();
        };
      });
    }

    // ── Свитчер ──
    function openSwitch() { $('switch-overlay').classList.add('open'); $('switch-sheet').classList.add('open'); }
    function closeSwitch() { $('switch-overlay').classList.remove('open'); $('switch-sheet').classList.remove('open'); }
    $('catalog-switch').onclick = openSwitch;
    $('switch-overlay').onclick = closeSwitch;

    $('btn-create-catalog').onclick = async () => {
      const name = $('new-catalog-name').value.trim();
      if (!name) { toast('Введи название'); return; }
      await createCatalog(name);
      $('new-catalog-name').value = '';
      closeSwitch(); await refresh(); toast('Каталог создан');
    };
    $('btn-join').onclick = async () => {
      const code = $('join-code').value.trim();
      if (!code) { toast('Введи код'); return; }
      const cid = await joinCatalogByCode(code);
      if (!cid) { toast('Код не найден'); return; }
      $('join-code').value = '';
      closeSwitch(); await refresh(); toast('Ты присоединился к каталогу');
    };

    // ── Профиль/выход ──
    $('avatar').onclick = async () => {
      if (confirm('Выйти из аккаунта?')) { await signOutUser(); location.reload(); }
    };
  </script>
  <script src="pwa.js"></script>
</body>
</html>
